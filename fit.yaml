version: 1

# EIP-8038 targets state-access operations performing worse than 100M gas/s.
anchor_rate: 100000000

clients:
  - besu
  - erigon
  - ethrex
  - geth
  - nethermind
  - reth

gas_costs:
  fork: osaka

new_params:
  COLD_ACCOUNT_NOCODE_ACCESS: 2600
  COLD_ACCOUNT_CODE_ACCESS: 2600
  ACCOUNT_WRITE: 6700
  STORAGE_WRITE: 2800

output:
  plots: true

glue_adjustment:
  enabled: true

derived:
  # Named after the osaka fork fields (REFUND_STORAGE_CLEAR=4800,
  # TX_ACCESS_LIST_STORAGE_KEY=1900, TX_ACCESS_LIST_ADDRESS=2400) so the
  # proposal diff picks up the current gas as the baseline. Shadowing those
  # fork fields is intentional (evm-gasfit warns but allows it).
  REFUND_STORAGE_CLEAR:
    formula: "(STORAGE_WRITE + COLD_STORAGE_ACCESS) * 4800 / 5000"
  TX_ACCESS_LIST_STORAGE_KEY: "COLD_STORAGE_ACCESS"
  TX_ACCESS_LIST_ADDRESS: "COLD_ACCOUNT_CODE_ACCESS"

models:
  presets:
    # --- Storage access (SSTORE, SLOAD) ---
    - cold_storage_sload
    - cold_storage_sstore

    # --- Account access (CALL, CALLCODE, BALANCE, SELFDESTRUCT, EXT*) ---
    - cold_account_nocode_access
    - cold_account_code_access

    # --- Warm access
    - warm_account_access
    - warm_storage_access_sload
